name: Build

on:
  push:
    branches:
      - '**'   # run on all branches
    tags-ignore:
      - '**'   # ignore all tags

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up BuildTools
        run: wget -O BuildTools.jar https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
      - name: Install JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'
          cache: 'maven'
      - name: Install CraftBukkit 1.21.11
        # Use build number 4576 to compile CraftBukkit 1.21.11.
        # https://hub.spigotmc.org/versions/
        run: |
          java -jar BuildTools.jar --rev 4576 --compile craftbukkit --remapped
      - name: Install Paper 1.21.11
        run: |
          mvn ca.bkaw:paper-nms-maven-plugin:init --pl :impl_paper_1_21_11
      - name: Install JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '25'
          cache: 'maven'
      # Use build number 4617 to compile CraftBukkit 26.1.1
      # https://hub.spigotmc.org/versions/
      - name: Install CraftBukkit 26.1.1, 26.2
        run: |
          java -jar BuildTools.jar --rev 4617 --compile craftbukkit
          java -jar BuildTools.jar --rev 26.2 --compile craftbukkit
      - name: Install Paper 26.1.2, 26.2
        run: |
          mvn ca.bkaw:paper-nms-maven-plugin:init --pl :impl_paper_26_1_2
          mvn ca.bkaw:paper-nms-maven-plugin:init --pl :impl_paper_26_2
      - name: Compile InvSee++
        run: >
          mvn clean package --batch-mode --update-snapshots
          -pl Utils,Mojang_API,FastStats,InvSee++_Common,InvSee++_Platforms/Impl_1_21_11_R7,InvSee++_Platforms/Impl_Paper_1_21_11,InvSee++_Platforms/Impl_26_1_1,InvSee++_Platforms/Impl_26_2,InvSee++_Platforms/Impl_Paper_26_1_2,InvSee++_Platforms/Impl_Paper_26_2,InvSee++_Platforms/Impl_Glowstone,InvSee++_PerWorldInventory,InvSee++_Plugin
          -am
      - name: Upload InvSee++ jar
        uses: actions/upload-artifact@v4
        with:
          name: InvSee++
          path: InvSee++_Plugin/target/InvSee++.jar
      - name: Deploy Javadoc
        uses: MathieuSoysal/Javadoc-publisher.yml@v2.4.0
        if: github.ref == 'refs/heads/master'
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          javadoc-branch: javadoc
          java-distribution: temurin
          java-version: 25
          custom-command: 'mvn package javadoc:aggregate -pl Utils,Mojang_API,FastStats,InvSee++_Common,InvSee++_Platforms/Impl_1_21_11_R7,InvSee++_Platforms/Impl_Paper_1_21_11,InvSee++_Platforms/Impl_26_1_1,InvSee++_Platforms/Impl_26_2,InvSee++_Platforms/Impl_Paper_26_1_2,InvSee++_Platforms/Impl_Paper_26_2,InvSee++_Platforms/Impl_Glowstone,InvSee++_PerWorldInventory,InvSee++_Plugin -am'
          target-folder: javadoc
          project: maven
